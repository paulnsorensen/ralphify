site_name: Ralphify
site_description: Harness toolkit for autonomous AI coding loops
site_url: https://computerlovetech.github.io/ralphify/
repo_url: https://github.com/computerlovetech/ralphify
repo_name: computerlovetech/ralphify
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2025–2026 Computerlove Technologies

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang: en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/computerlovetech/ralphify
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ralphify/

nav:
  - Home: index.md
  - Guide:
    - Why Ralphify?: why-ralphify.md
    - Getting Started: getting-started.md
    - How It Works: how-it-works.md
    - Writing Your Prompt: prompts.md
    - Best Practices: best-practices.md
    - Using with Different Agents: agents.md
    - Cookbook: cookbook.md
  - Reference:
    - Quick Reference: quick-reference.md
    - Primitives: primitives.md
    - Configuration & CLI: cli.md
  - Help:
    - FAQ: faq.md
    - Troubleshooting: troubleshooting.md
    - Contributing: contributing.md
    - Changelog: changelog.md
